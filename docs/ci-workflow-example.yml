# Example GitHub Actions workflow for CI/CD
# Copy to .github/workflows/ci.yml to enable. Add secrets in repo Settings → Secrets.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  # Optional: deploy to your hosting when pushing to main
